line-length = 100
target-version = "py312"

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "S",    # flake8-bandit (security)
    "A",    # flake8-builtins
    "C4",   # flake8-comprehensions
    "DTZ",  # flake8-datetimez
    "T20",  # flake8-print
    "RUF",  # ruff-specific
]
ignore = [
    "S101",  # allow assert (used in tests)
    "S104",  # binding to 0.0.0.0 ok in dev
]

[lint.per-file-ignores]
"tests/**/*.py" = ["S", "DTZ", "T20"]
"**/tests/**/*.py" = ["S", "DTZ", "T20"]
"**/commands/*.py" = ["B008"]  # Typer uses function calls in argument defaults

[lint.isort]
known-first-party = ["calango", "calango_cli"]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
