[tool.uv.workspace]
members = ["packages/calango-core", "packages/calango-cli"]

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
    "httpx>=0.27",
    "anyio[trio]>=4",
    "ruff>=0.8",
    "ty>=0.0.1a1",
    "pytest-cov>=7.1.0",
    "aiosqlite>=0.22.1",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["packages"]
addopts = "-v --tb=short"
