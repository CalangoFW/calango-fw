[project]
name = "calango-cli"
version = "0.1.0-dev"
description = "Calango Framework — CLI and scaffold"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
dependencies = [
    "typer>=0.13",
    "jinja2>=3.1",
    "rich>=13",
    "calango-core",
]

[project.scripts]
calango = "calango_cli.main:app"

[tool.uv.sources]
calango-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["calango_cli"]
