repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14  # keep in sync with the ruff version CI resolves via uv
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: ty-check
        name: ty (type checker)
        entry: uv run ty check
        language: system
        types: [python]
        pass_filenames: false

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: detect-private-key
        # Exclude known test keys and docstring examples — RS256 tests need real
        # keys, and the identity settings/docs only show placeholder examples.
        exclude: |
          (?x)^(
            packages/calango-plugins/calango-identity/calango_identity/settings\.py|
            packages/calango-plugins/calango-identity/tests/conftest\.py|
            docs/superpowers/plans/2026-05-28-calango-identity\.md|
            docs/superpowers/specs/2026-05-28-calango-identity-design\.md
          )$
